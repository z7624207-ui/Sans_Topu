<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milyonçu Snake Oyunu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- BAŞLANĞIC -->
    <div id="startScreen">
        <div class="container">
            <h1>Milyonçu Snake Oyunu</h1>
            <h2>Oyuna Xoş Gəldin!</h2>
            <p>Adını yaz və başla:</p>
            <input type="text" id="playerName" placeholder="Adın" required>
            <button onclick="startGame()">Oyuna Başla</button>
        </div>
    </div>

    <!-- OYUN -->
    <div id="gameScreen" style="display:none;">
        <div class="container">
            <h2 id="question"></h2>
            <div id="score">Xal: 0</div>
            <div id="answers"></div>
        </div>
    </div>

    <!-- BİTDİ -->
    <div id="gameOverScreen" style="display:none;">
        <div class="container">
            <h1>Oyun Bitdi!</h1>
            <h2 id="finalMessage"></h2>
            <p>Topladığın Xal: <span id="finalScore">0</span></p>
            <p>Nəticən qeydə alındı!</p>
            <button onclick="restartGame()">Yenidən Oyna</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
